<style>

  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;

  }
  .wrap{max-width:1100px; margin:0 auto;}
  header{margin-bottom:24px; text-align:center;}
  h1{font-size:26px; margin:0 0 4px; letter-spacing:.03em;}
  .sub{color:var(--muted); font-size:13px;}
  .grid{
    display:grid; grid-template-columns:1fr 1fr;
    gap:16px; margin:24px 0;
  }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  .panel{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:18px;
  }
  .panel h2{font-size:13px; margin:0 0 4px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .panel .last{font-size:22px; font-weight:700; margin-bottom:10px;}
  .panel.kcal .last{color:var(--kcal);}
  .panel.prot .last{color:var(--prot);}
  .panel.carb .last{color:var(--carb);}
  .panel.sugar .last{color:var(--sugar);}
  .table-panel{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:20px; margin-top:8px;
  }
  .table-panel h2{font-size:14px; margin:0 0 16px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .collapsible-header{
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; user-select:none;
  }
  .collapsible-header .chevron{
    color:var(--muted); font-size:12px; transition:transform .2s ease;
  }
  .table-panel.collapsed .chevron{ transform:rotate(-90deg); }
  .table-panel.collapsed .collapsible-body{ display:none; }
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--panel-border);}
  th{color:var(--muted); font-weight:500; font-size:12px;}
  td.items{color:var(--muted); font-size:12px; max-width:300px;}
  .empty{color:var(--muted); font-size:14px; padding:24px 0; text-align:center;}
  .chart-wrap{position:relative; height:300px;}
  canvas{max-height:260px;}
  .view-toggle{
    display:flex; justify-content:center; gap:8px; margin:0 0 20px;
  }
  .view-toggle button{
    background:var(--panel); color:var(--muted); border:1px solid var(--panel-border);
    border-radius:8px; padding:8px 22px; font-size:13px; font-weight:600;
    letter-spacing:.03em; cursor:pointer; transition:all .15s ease;
    font-family:inherit;
  }
  .view-toggle button:hover{ color:var(--text); border-color:#3a4051; }
  .view-toggle button.active{
    background:var(--kcal); color:#1a1206; border-color:var(--kcal);
  }
</style>

function fmtFecha(f){
  const d = new Date(f + 'T00:00:00');
  return d.toLocaleDateString('es-CL', {day:'2-digit', month:'2-digit'});
}

function getISOWeek(fecha){
  const date = new Date(fecha + 'T00:00:00');
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { year: d.getUTCFullYear(), week: weekNo };
}

function round1(n){ return Math.round(n * 10) / 10; }

function buildWeekly(days){
  const map = new Map();
  const order = [];
  days.forEach(d => {
    const { year, week } = getISOWeek(d.fecha);
    const key = year + '-W' + week;
    if (!map.has(key)){
      map.set(key, {
        key, year, week, fechas: [],
        totales: { kcal:0, proteina_g:0, carbohidratos_g:0, grasa_g:0, azucares_g:0 },
        kcal_quemadas_total: 0
      });
      order.push(key);
    }
    const w = map.get(key);
    w.fechas.push(d.fecha);
    w.totales.kcal += d.totales.kcal;
    w.totales.proteina_g += d.totales.proteina_g;
    w.totales.carbohidratos_g += d.totales.carbohidratos_g;
    w.totales.grasa_g += d.totales.grasa_g;
    w.totales.azucares_g += d.totales.azucares_g;
    w.kcal_quemadas_total += (d.actividad && d.actividad.kcal_quemadas_total) || 0;
  });
  return order.map(k => {
    const w = map.get(k);
    w.totales.kcal = round1(w.totales.kcal);
    w.totales.proteina_g = round1(w.totales.proteina_g);
    w.totales.carbohidratos_g = round1(w.totales.carbohidratos_g);
    w.totales.grasa_g = round1(w.totales.grasa_g);
    w.totales.azucares_g = round1(w.totales.azucares_g);
    w.kcal_quemadas_total = round1(w.kcal_quemadas_total);
    return w;
  });
}

const gridColor = '#262b36';
const tickColor = '#8b93a3';
const chartInstances = {};

function destroyChart(id){
  if (chartInstances[id]){ chartInstances[id].destroy(); chartInstances[id] = null; }
}

function baseLineChart(canvasId, title, labels, data, color, extraDatasets){
  destroyChart(canvasId);
  const datasets = [{
    label: '', data, borderColor: color,
    backgroundColor: color + '22', fill: true, tension: 0.3,
    pointRadius: 3, pointBackgroundColor: color
  }];
  if (extraDatasets) datasets.push(...extraDatasets);
  chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: title, color: '#ffffff', font: { weight: 'bold', size: 15 }, align: 'center', padding: { bottom: 14 } },
        legend: { display: true, position: 'bottom', labels: { color: '#e8eaed', boxWidth: 12, font: {size: 11} } }
      },
      scales: {
        x: { offset: false, ticks: { color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

}
</script>
</body>
