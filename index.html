<script>
  window.onerror = function(msg, url, line, col, error){
    var el = document.createElement('div');
    el.style.cssText = 'background:#c0392b;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;white-space:pre-wrap;position:relative;z-index:9999;';
    el.textContent = 'ERROR EN LA PÁGINA: ' + msg + '  (línea ' + line + ')';
    document.body.insertAdjacentElement('afterbegin', el);

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" onerror="document.addEventListener('DOMContentLoaded', function(){ var el=document.createElement('div'); el.style.cssText='background:#c0392b;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;'; el.textContent='ERROR: no se pudo cargar Chart.js desde el CDN.'; document.body.insertAdjacentElement(\'afterbegin\', el); });"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-border:#262b36;
    --text:#e8eaed; --muted:#8b93a3;
    --kcal:#f2994a; --prot:#56ccf2; --carb:#bb6bd9; --sugar:#eb5757;
    --baseline:#4f5666;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    padding:32px 20px 60px;
  }
  .wrap{max-width:1100px; margin:0 auto;}
  header{margin-bottom:24px; text-align:center;}
  h1{font-size:26px; margin:0 0 4px; letter-spacing:.03em;}
  .sub{color:var(--muted); font-size:13px;}
  .grid{
    display:grid; grid-template-columns:1fr 1fr;
    gap:16px; margin:24px 0;
  }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  .panel{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:18px;
  }
  .panel h2{font-size:13px; margin:0 0 4px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .panel .last{font-size:22px; font-weight:700; margin-bottom:10px;}
  .panel.kcal .last{color:var(--kcal);}
  .panel.prot .last{color:var(--prot);}
  .panel.carb .last{color:var(--carb);}
  .panel.sugar .last{color:var(--sugar);}
  .table-panel{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:20px; margin-top:8px;
  }
  .table-panel h2{font-size:14px; margin:0 0 16px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .collapsible-header{
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; user-select:none;
  }
  .collapsible-header .chevron{
    color:var(--muted); font-size:12px; transition:transform .2s ease;
  }
  .table-panel.collapsed .chevron{ transform:rotate(-90deg); }
  .table-panel.collapsed .collapsible-body{ display:none; }
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--panel-border);}
  th{color:var(--muted); font-weight:500; font-size:12px;}
  td.items{color:var(--muted); font-size:12px; max-width:300px;}
  .empty{color:var(--muted); font-size:14px; padding:24px 0; text-align:center;}
  .chart-wrap{position:relative; height:300px;}
  canvas{max-height:260px;}
</style>
</head>

function fmtFecha(f){

}

const gridColor = '#262b36';

function baseLineChart(canvasId, title, labels, data, color, extraDatasets){
  const datasets = [{
    label: '', data, borderColor: color,
    backgroundColor: color + '22', fill: true, tension: 0.3,
    pointRadius: 3, pointBackgroundColor: color
  }];
  if (extraDatasets) datasets.push(...extraDatasets);
  return new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: title, color: '#ffffff', font: { weight: 'bold', size: 15 }, align: 'center', padding: { bottom: 14 } },

});

} catch (err) {
  const el = document.createElement('div');
  el.style.cssText = 'background:#c0392b;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;white-space:pre-wrap;';
  el.textContent = 'ERROR AL RENDERIZAR EL DASHBOARD: ' + err.message + '\n\n' + (err.stack || '');
  document.body.insertAdjacentElement('afterbegin', el);
}
</script>
</body>
</html>
