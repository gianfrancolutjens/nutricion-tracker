<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUTRICIÓN GIANFRANCO</title>
<script>
  window.onerror = function(msg, url, line, col, error){
    var el = document.createElement('div');
    el.style.cssText = 'background:#c0392b;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;white-space:pre-wrap;position:relative;z-index:9999;';
    el.textContent = 'ERROR EN LA PÁGINA: ' + msg + '  (línea ' + line + ')';
    document.body.insertAdjacentElement('afterbegin', el);
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" onerror="document.addEventListener('DOMContentLoaded', function(){ var el=document.createElement('div'); el.style.cssText='background:#c0392b;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;'; el.textContent='ERROR: no se pudo cargar Chart.js desde el CDN.'; document.body.insertAdjacentElement(\'afterbegin\', el); });"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-border:#262b36;
    --text:#e8eaed; --muted:#8b93a3;
    --kcal:#f2994a; --prot:#56ccf2; --carb:#bb6bd9; --sugar:#eb5757;
    --baseline:#4f5666;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    padding:32px 20px 60px;
  }
  .wrap{max-width:1100px; margin:0 auto;}
  header{margin-bottom:24px; text-align:center;}
  h1{font-size:26px; margin:0 0 4px; letter-spacing:.03em;}
  .sub{color:var(--muted); font-size:13px;}
  .grid{
    display:grid; grid-template-columns:1fr 1fr;
    gap:16px; margin:24px 0;
  }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  .panel{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:18px;
  }
  .panel h2{font-size:13px; margin:0 0 4px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .panel .last{font-size:22px; font-weight:700; margin-bottom:10px;}
  .panel.kcal .last{color:var(--kcal);}
  .panel.prot .last{color:var(--prot);}
  .panel.carb .last{color:var(--carb);}
  .panel.sugar .last{color:var(--sugar);}
  .table-panel{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:20px; margin-top:8px;
  }
  .table-panel h2{font-size:14px; margin:0 0 16px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--panel-border);}
  th{color:var(--muted); font-weight:500; font-size:12px;}
  td.items{color:var(--muted); font-size:12px; max-width:300px;}
  .empty{color:var(--muted); font-size:14px; padding:24px 0; text-align:center;}
  .chart-wrap{position:relative; height:300px;}
  canvas{max-height:260px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>NUTRICIÓN GIANFRANCO</h1>
    <div class="sub" id="generado">Generado: —</div>
  </header>

  <div class="grid">
    <div class="panel kcal">
      <div class="chart-wrap"><canvas id="chartKcal"></canvas></div>
    </div>
    <div class="panel prot">
      <div class="chart-wrap"><canvas id="chartProt"></canvas></div>
    </div>
    <div class="panel carb">
      <div class="chart-wrap"><canvas id="chartCarb"></canvas></div>
    </div>
    <div class="panel sugar">
      <div class="chart-wrap"><canvas id="chartSugar"></canvas></div>
    </div>
  </div>

  <div class="table-panel">
    <h2>Registro diario</h2>
    <table id="tabla">
      <thead>
        <tr><th>Fecha</th><th>Kcal</th><th>KcalQ</th><th>Prot (g)</th><th>Carb (g)</th><th>Azúcar (g)</th><th>Grasa (g)</th><th>Detalle</th></tr>
      </thead>
      <tbody id="tabla-body"></tbody>
    </table>
    <div class="empty" id="empty-tabla" style="display:none;">Aún no hay entradas registradas.</div>
  </div>
</div>

<script>
// ==== DATOS (bloque actualizado por Claude en cada publicación) ====
const DAILY_LOG = [
  {
    "fecha": "2026-07-09",
    "items": [
      {"nombre": "Pan integral + 2 huevos revueltos", "kcal": 400, "proteina_g": 19.5, "carbohidratos_g": 38, "grasa_g": 18, "azucares_g": 4, "fuente": "estimado"},
      {"nombre": "2 jaleas Regimel 1 caloría", "kcal": 5, "proteina_g": 0, "carbohidratos_g": 1, "grasa_g": 0, "azucares_g": 0, "fuente": "estimado"},
      {"nombre": "1 Kem Piña lata (350ml, bebida)", "kcal": 147, "proteina_g": 0, "carbohidratos_g": 37, "grasa_g": 0, "azucares_g": 37, "fuente": "food-database"},
      {"nombre": "Salmón al horno con arroz", "kcal": 485, "proteina_g": 38, "carbohidratos_g": 43, "grasa_g": 16.4, "azucares_g": 0.1, "fuente": "estimado"},
      {"nombre": "2 yogurt blanco + 1 scoop proteína", "kcal": 414, "proteina_g": 37.8, "carbohidratos_g": 22.6, "grasa_g": 19.5, "azucares_g": 18.2, "fuente": "food-database"},
      {"nombre": "2 barras de proteína", "kcal": 424, "proteina_g": 41.2, "carbohidratos_g": 22.8, "grasa_g": 16.2, "azucares_g": 2.8, "fuente": "food-database"}
    ],
    "totales": {"kcal": 1875, "proteina_g": 136.5, "carbohidratos_g": 164.4, "grasa_g": 70.1, "azucares_g": 62.1},
    "actividad": {"detalle": [], "kcal_quemadas_total": 0, "nota": "Descanso, no fue al gym"}
  },
  {
    "fecha": "2026-07-10",
    "items": [
      {"nombre": "Wrap de pollo (tortilla integral, pollo sweet thai panko, quinoa tricolor, palta, verduras, nueces, mostaza miel, salsa tailandesa)", "kcal": 800, "proteina_g": 34, "carbohidratos_g": 87, "grasa_g": 35, "azucares_g": 19, "fuente": "estimado"},
      {"nombre": "2 yogurt blanco + 1 scoop proteína", "kcal": 414, "proteina_g": 37.8, "carbohidratos_g": 22.6, "grasa_g": 19.5, "azucares_g": 18.2, "fuente": "food-database"},
      {"nombre": "1/2 barra de proteína", "kcal": 106, "proteina_g": 10.3, "carbohidratos_g": 5.7, "grasa_g": 4.05, "azucares_g": 0.7, "fuente": "food-database"},
      {"nombre": "1 Kem Piña lata completa (350ml)", "kcal": 147, "proteina_g": 0, "carbohidratos_g": 37, "grasa_g": 0, "azucares_g": 37, "fuente": "food-database"},
      {"nombre": "1 Coca-Cola Zero 500ml", "kcal": 2, "proteina_g": 0, "carbohidratos_g": 0.2, "grasa_g": 0, "azucares_g": 0, "fuente": "food-database"},
      {"nombre": "1 porción de pie de limón", "kcal": 380, "proteina_g": 5, "carbohidratos_g": 52, "grasa_g": 15, "azucares_g": 38, "fuente": "estimado"}
    ],
    "totales": {"kcal": 1849, "proteina_g": 87.1, "carbohidratos_g": 204.5, "grasa_g": 73.55, "azucares_g": 112.9},
    "actividad": {"detalle": [{"actividad": "Elíptica", "duracion_min": 40, "intensidad": "moderada", "kcal_quemadas": 250}], "kcal_quemadas_total": 250}
  }
];
const METABOLISMO_BASAL = 1600;
const OBJETIVO_KCAL = 1760;
const OBJETIVO_PROTEINA = 150;
const OBJETIVO_CARBOHIDRATOS = 155;
const OBJETIVO_AZUCAR = 40;
// ==== FIN DATOS ====

document.getElementById('generado').textContent =
  'Generado: ' + new Date().toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'});

try {

const sorted = [...DAILY_LOG].sort((a,b) => a.fecha.localeCompare(b.fecha));

function fmtFecha(f){
  const d = new Date(f + 'T00:00:00');
  return d.toLocaleDateString('es-CL', {day:'2-digit', month:'2-digit'});
}

const gridColor = '#262b36';
const tickColor = '#8b93a3';

function baseLineChart(canvasId, title, labels, data, color, extraDatasets){
  const datasets = [{
    label: '', data, borderColor: color,
    backgroundColor: color + '22', fill: true, tension: 0.3,
    pointRadius: 3, pointBackgroundColor: color
  }];
  if (extraDatasets) datasets.push(...extraDatasets);
  return new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: title, color: '#ffffff', font: { weight: 'bold', size: 15 }, align: 'center', padding: { bottom: 14 } },
        legend: { display: true, position: 'bottom', labels: { color: '#e8eaed', boxWidth: 12, font: {size: 11} } }
      },
      scales: {
        x: { offset: false, ticks: { color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

if (sorted.length === 0){
  document.getElementById('empty-tabla').style.display = 'block';
  const titles = { chartKcal: 'Calorías quemadas vs Ingeridas', chartProt: 'Consumo Proteínas', chartCarb: 'Consumo Carbohidratos', chartSugar: 'Consumo Azúcares' };
  ['chartKcal','chartProt','chartCarb','chartSugar'].forEach(id=>{
    baseLineChart(id, titles[id], [], []);
  });
} else {
  const last = sorted[sorted.length - 1];

  const labels = sorted.map(d => fmtFecha(d.fecha));
  const kcal = sorted.map(d => d.totales.kcal);
  const prot = sorted.map(d => d.totales.proteina_g);
  const carb = sorted.map(d => d.totales.carbohidratos_g);
  const sugar = sorted.map(d => d.totales.azucares_g);
  const quemadas = sorted.map(d => (d.actividad && d.actividad.kcal_quemadas_total) || 0);

  new Chart(document.getElementById('chartKcal'), {
    type: 'bar',
    data: { labels, datasets: [
      { type: 'bar', label: 'Quemadas', data: quemadas,
        backgroundColor: '#2d9cdb', borderColor: '#2d9cdb', borderWidth: 1, order: 3 },
      { type: 'line', label: 'Consumidas', data: kcal, borderColor: '#f2994a',
        backgroundColor: '#f2994a', fill: false, tension: 0.3, pointRadius: 3,
        pointBackgroundColor: '#f2994a', order: 0 },
      { type: 'line', label: 'Basal (1600)', data: labels.map(() => METABOLISMO_BASAL),
        borderColor: '#4f5666', borderDash: [6,4], pointRadius: 0, fill: false, tension: 0, order: 1 },
      { type: 'line', label: 'Objetivo (1760)', data: labels.map(() => OBJETIVO_KCAL),
        borderColor: '#27ae60', borderDash: [6,4], pointRadius: 0, fill: false, tension: 0, order: 2 }
    ]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: 'Calorías quemadas vs Ingeridas', color: '#ffffff', font: { weight: 'bold', size: 15 }, align: 'center', padding: { bottom: 14 } },
        legend: { display: true, position: 'bottom', labels: { color: '#e8eaed', boxWidth: 12, font: {size: 11} } }
      },
      scales: {
        x: { offset: false, ticks: { color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
  baseLineChart('chartProt', 'Consumo Proteínas', labels, prot, '#56ccf2', [
    { label: 'Objetivo (150g)', data: labels.map(() => OBJETIVO_PROTEINA),
      borderColor: '#27ae60', borderDash: [6,4], pointRadius: 0, fill: false, tension: 0 }
  ]);
  baseLineChart('chartCarb', 'Consumo Carbohidratos', labels, carb, '#bb6bd9', [
    { label: 'Objetivo (155g)', data: labels.map(() => OBJETIVO_CARBOHIDRATOS),
      borderColor: '#27ae60', borderDash: [6,4], pointRadius: 0, fill: false, tension: 0 }
  ]);
  baseLineChart('chartSugar', 'Consumo Azúcares', labels, sugar, '#eb5757', [
    { label: 'Tope (40g)', data: labels.map(() => OBJETIVO_AZUCAR),
      borderColor: '#27ae60', borderDash: [6,4], pointRadius: 0, fill: false, tension: 0 }
  ]);

  const tbody = document.getElementById('tabla-body');
  [...sorted].reverse().forEach(d => {
    const tr = document.createElement('tr');
    const itemsStr = (d.items || []).map(i => i.nombre).join(', ');
    const kcalQ = (d.actividad && d.actividad.kcal_quemadas_total) || 0;
    tr.innerHTML = `<td>${d.fecha}</td><td>${d.totales.kcal}</td><td>${kcalQ}</td><td>${d.totales.proteina_g}</td><td>${d.totales.carbohidratos_g}</td><td>${d.totales.azucares_g}</td><td>${d.totales.grasa_g}</td><td class="items">${itemsStr}</td>`;
    tbody.appendChild(tr);
  });
}

} catch (err) {
  const el = document.createElement('div');
  el.style.cssText = 'background:#c0392b;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;white-space:pre-wrap;';
  el.textContent = 'ERROR AL RENDERIZAR EL DASHBOARD: ' + err.message + '\n\n' + (err.stack || '');
  document.body.insertAdjacentElement('afterbegin', el);
}
</script>
</body>
</html>
